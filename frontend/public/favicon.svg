<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#09090b" stroke="rgba(255,255,255,0.05)" stroke-width="4"/>
  <!-- Decorative Glow -->
  <circle cx="256" cy="256" r="160" fill="url(#grad)" opacity="0.15" filter="url(#glow)"/>
  <!-- Biometric/Face Scan Frame -->
  <path d="M 140 180 L 140 140 L 180 140" fill="none" stroke="#818cf8" stroke-width="12" stroke-linecap="round"/>
  <path d="M 332 140 L 372 140 L 372 180" fill="none" stroke="#818cf8" stroke-width="12" stroke-linecap="round"/>
  <path d="M 140 332 L 140 372 L 180 372" fill="none" stroke="#818cf8" stroke-width="12" stroke-linecap="round"/>
  <path d="M 332 372 L 372 372 L 372 332" fill="none" stroke="#818cf8" stroke-width="12" stroke-linecap="round"/>
  <!-- Outer Shield -->
  <path d="M 256 160 C 290 160 320 180 320 220 C 320 280 256 340 256 340 C 256 340 192 280 192 220 C 192 180 222 160 256 160 Z" fill="url(#shieldGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="6"/>
  <!-- Inner Face Scan Icon -->
  <circle cx="256" cy="210" r="22" fill="#ffffff"/>
  <path d="M 220 270 C 220 250 236 240 256 240 C 276 240 292 250 292 270" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <path d="M 256 230 L 256 255" fill="none" stroke="#818cf8" stroke-width="6" stroke-linecap="round"/>
</svg>
